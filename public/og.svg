<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="22%" r="55%">
      <stop offset="0%" stop-color="rgba(255, 107, 53, 0.32)"/>
      <stop offset="100%" stop-color="rgba(255, 107, 53, 0)"/>
    </radialGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff6b35"/>
      <stop offset="1" stop-color="#ffa476"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#ffa476"/>
    </linearGradient>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="rgba(255, 255, 255, 0.018)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- decorative ambient sine -->
  <path d="M 0 540 Q 200 460, 400 540 T 800 540 T 1200 540" fill="none" stroke="rgba(255, 107, 53, 0.22)" stroke-width="2"/>
  <path d="M 0 580 Q 200 500, 400 580 T 800 580 T 1200 580" fill="none" stroke="rgba(255, 255, 255, 0.06)" stroke-width="2"/>

  <!-- brand mark — scaled-up oscilloscope sine→square -->
  <g transform="translate(80, 80)">
    <rect x="0" y="0" width="96" height="96" rx="22" fill="#0a0a0d" stroke="rgba(255, 255, 255, 0.12)" stroke-width="2"/>
    <path d="M 18 48 Q 27 24, 36 48 T 54 48 L 54 35 L 66 35 L 66 65 L 78 65 L 78 48 L 84 48"
      fill="none" stroke="url(#wave)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="78" cy="20" r="4.5" fill="#ff8551"/>
  </g>

  <!-- handle -->
  <text x="200" y="135" font-family="Plus Jakarta Sans, sans-serif" font-size="22" font-weight="600" fill="rgba(255, 255, 255, 0.6)" letter-spacing="0.16em">SYSO.CODES</text>
  <text x="200" y="160" font-family="Plus Jakarta Sans, sans-serif" font-size="16" font-weight="500" fill="rgba(255, 255, 255, 0.42)">Sylwester · DatanoiseTV · Berlin</text>

  <!-- title -->
  <text x="80" y="320" font-family="Plus Jakarta Sans, sans-serif" font-size="80" font-weight="800" fill="#ffffff" letter-spacing="-0.04em">I build tools where</text>
  <text x="80" y="410" font-family="Plus Jakarta Sans, sans-serif" font-size="80" font-weight="800" fill="url(#title-grad)" letter-spacing="-0.04em">audio meets silicon.</text>

  <!-- subtitle -->
  <text x="80" y="468" font-family="Plus Jakarta Sans, sans-serif" font-size="22" font-weight="500" fill="rgba(255, 255, 255, 0.62)">
    Embedded firmware · FPGA gateware · DSP languages · network audio · native macOS
  </text>

  <!-- stats row -->
  <g transform="translate(80, 510)">
    <text x="0" y="34" font-family="Plus Jakarta Sans, sans-serif" font-size="40" font-weight="800" fill="#ffffff" letter-spacing="-0.025em">245</text>
    <text x="0" y="58" font-family="Plus Jakarta Sans, sans-serif" font-size="13" font-weight="600" fill="rgba(255, 255, 255, 0.42)" letter-spacing="0.14em">PUBLIC REPOS</text>

    <line x1="155" y1="20" x2="155" y2="64" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1"/>

    <text x="190" y="34" font-family="Plus Jakarta Sans, sans-serif" font-size="40" font-weight="800" fill="#ffffff" letter-spacing="-0.025em">1,077</text>
    <text x="190" y="58" font-family="Plus Jakarta Sans, sans-serif" font-size="13" font-weight="600" fill="rgba(255, 255, 255, 0.42)" letter-spacing="0.14em">GITHUB STARS</text>

    <line x1="380" y1="20" x2="380" y2="64" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1"/>

    <text x="415" y="34" font-family="Plus Jakarta Sans, sans-serif" font-size="40" font-weight="800" fill="#ffffff" letter-spacing="-0.025em">112+</text>
    <text x="415" y="58" font-family="Plus Jakarta Sans, sans-serif" font-size="13" font-weight="600" fill="rgba(255, 255, 255, 0.42)" letter-spacing="0.14em">FEATURED PROJECTS</text>
  </g>

  <!-- corner accent -->
  <text x="1120" y="600" text-anchor="end" font-family="Plus Jakarta Sans, sans-serif" font-size="14" font-weight="500" fill="rgba(255, 255, 255, 0.32)" letter-spacing="0.08em">syso.codes</text>
</svg>
